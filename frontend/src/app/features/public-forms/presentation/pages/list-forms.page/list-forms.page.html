<div class="flex flex-col md:grid md:grid-cols-3 lg:grid-cols-4 gap-4 w-full">
  @for (
    item of facade.formsCurrentTenant();
    track item.code;
    let i = $index;
    let count = $count;
    let isEven = $even
  ) {
    <app-card
      [clickable]="true"
      [ngClass]="cardsConditions(count, i, isEven)"
      class="rounded-xl overflow-hidden transition-all duration-300 shadow-md hover:shadow-lg flex flex-col h-full"
      (click)="goToForm(item)"
      size="sm"
    >
      <div class="flex h-full" [ngClass]="getCardLayoutClasses(count, i)">
        <div class="flex flex-col h-full justify-between flex-1 p-5">
          <div>
            <h3
              class="font-bold text-gray-800 tracking-tight transition-all duration-300"
              [ngClass]="getTitleClasses(count, i)"
            >
              {{ item.name }}
            </h3>

            <div class="flex items-center gap-2 text-sm text-gray-500 font-mono">
              <span class="bg-pv-tertiary-400 px-2 py-1 rounded-md">{{ item.code }}</span>
            </div>

            <p class="mt-4 text-gray-600 text-sm leading-relaxed">
              {{ item.description || 'Sin descripción disponible' }}
            </p>
          </div>

          <div class="mt-6 flex gap-3">
            <button
              (click)="goToForm(item)"
              class="px-4 py-2 rounded-lg font-medium text-sm transition-colors w-full md:w-auto text-white bg-pv-primary-500 hover:bg-pv-primary-700 cursor-pointer"
            >
              Participar
            </button>
          </div>
        </div>

        @if (item.imageUrl) {
          <div [ngClass]="getImageClasses(count, i)">
            <img
              [ngSrc]="item.imageUrl"
              [alt]="'Imagen descriptiva del formulario ' + item.name"
              fill
              class="object-cover transition-transform duration-500 group-hover:scale-105 rounded-2xl"
              [priority]="i < 2"
            />
          </div>
        }
      </div>
    </app-card>
  } @empty {
    <p>No hay formularios disponibles</p>
  }
</div>
