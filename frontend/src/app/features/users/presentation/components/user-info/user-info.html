<div class="flex justify-between">
  <div class="flex flex-col">
    <h2 class="text-xl font-semibold text-primary-red-500">Información del usuario</h2>
    <p class="text-gray-900 text-sm font-normal mb-1">
      El usuario ha sido creado exitosamente y existe dentro del sistema. 
    </p>
    <div class="grid grid-cols-2 gap-2">
      <p class="text-gray-700"><strong>Nombre:</strong> {{ user().fullName }}</p>
      <p class="text-gray-700"><strong>Email:</strong> {{ user().email }}</p>
      <p class="text-gray-700"><strong>Rol:</strong> {{ user().role | roleName }}</p>
    </div>
  </div>
  <!-- <app-button variant="ghost">Limpiar</app-button> -->
</div>
