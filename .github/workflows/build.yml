name: Build Images

on:
  push:
    branches:
      - main
    paths:
      - 'api-rest/**'
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
      
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: github-ci@campein.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker us-east1-docker.pkg.dev --quiet

      # 🔷 API
      - name: Build & Push API
        run: |
          docker build \
            -t us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/prod-campein/prod-api:${{ github.sha }} \
            ./api-rest

          docker push \
            us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/prod-campein/prod-api:${{ github.sha }}

      # 🔷 FRONT
      - name: Build & Push Front
        run: |
          docker build \
            -t us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/prod-campein/prod-front:${{ github.sha }} \
            ./frontend

          docker push \
            us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/prod-campein/prod-front:${{ github.sha }}
