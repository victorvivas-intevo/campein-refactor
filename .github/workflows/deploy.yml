name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "SHA a desplegar"
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: github-ci@campein.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      # 🔷 Deploy API
      - name: Deploy API
        run: |
          gcloud run deploy prod-api-service \
            --image us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/prod-campein/prod-api:${{ github.event.inputs.image_tag }} \
            --region us-east1 \
            --platform managed

      # 🔷 Deploy Front
      - name: Deploy Front
        run: |
          gcloud run deploy prod-front-campein \
            --image us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/prod-campein/prod-front:${{ github.event.inputs.image_tag }} \
            --region us-east1 \
            --platform managed
